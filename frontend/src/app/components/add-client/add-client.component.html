<div class="content">
    <form
        submit="addClient(correo.value,lastName.value,name.value, phone.valueAsNumber,phone_ch.valueAsNumber, street.value, localidad.value)">

        <h5>Nombre</h5>
        <label for="name">Nombre: </label>
        <input type="text" placeholder="nombre" id="name" #name>
        <label class="apellido" for="lastName">Apellido: </label>
        <input type="text" placeholder="apellido" id="lastName" #lastName>
        <h5>Contacto</h5>
        <label for="correo">Correo: </label>
        <input type="email" placeholder="correo@ejemplo.com" id="correo" #correo>
        <h6>Teléfono</h6>
        <label for="phone_ch">Característica: </label>
        <input type="number" minLength="2" placeholder="2 a 4 dígitos" maxlength="4" id="phone_ch" #phone_ch>
        <label class="apellido" for="phone">Número</label>
        <input type="number" id="phone" placeholder="6 dígitos" minlength="6" minlength="6" #phone>
        <h5>Dirección</h5>
        <label for="localidad">Localidad: </label>
        <input type="text" id="localidad" placeholder="Localidad" #localidad>
        <label class="apellido" for="street">Dirección::</label>
        <input type="text" placeholder="Mitre 665" id="street" #street>
        <div style="margin-top:10px">
            <button type="submit" style="width:100px">Confirmar</button>
        </div>
    </form>
</div>
